# Hogwarts lab: plane + N agent containers
#
#   cd lab && docker compose up --build
#   # or: ./run_lab.sh
#
# Hogwarts Plane panel:
#   base_url  http://127.0.0.1:8080
#   api_token dev

services:
  plane:
    build:
      context: ..
      dockerfile: lab/Dockerfile.plane
    environment:
      PLANE_OPERATOR_TOKEN: dev
      PLANE_HTTP_ADDR: 0.0.0.0:8080
      PLANE_DB: /data/plane.db
    ports:
      - "8080:8080"
    volumes:
      - plane-data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health')"]
      interval: 3s
      timeout: 3s
      retries: 10

  agent:
    build:
      context: ..
      dockerfile: lab/Dockerfile.agent
    depends_on:
      plane:
        condition: service_healthy
    environment:
      PLANE_URL: http://plane:8080
      PLANE_OPERATOR_TOKEN: dev
      AGENT_SLEEP: "3"
      AGENT_JITTER: "0.2"
    # scale: docker compose up --scale agent=3
    restart: unless-stopped

volumes:
  plane-data:
